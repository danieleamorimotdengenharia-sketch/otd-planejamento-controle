<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTD Engenharia — Planejamento e Controle</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --azul:    #1F3864;
    --azul2:   #2d4f8e;
    --verde:   #28a745;
    --laranja: #FF8C00;
    --vermelho:#dc3545;
    --amarelo: #ffc107;
    --cinza:   #6c757d;
    --bg:      #f0f2f5;
    --card:    #ffffff;
    --border:  #dde3ec;
    --text:    #212529;
    --text2:   #5a6478;
    --sidebar: 220px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

  /* SIDEBAR */
  #sidebar {
    width: var(--sidebar); background: var(--azul); color: #fff;
    display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
  }
  .sidebar-logo {
    padding: 20px 16px 16px; border-bottom: 1px solid rgba(255,255,255,0.15);
  }
  .sidebar-logo .logo-text { font-size: 11px; opacity: .7; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }
  .sidebar-logo .logo-title { font-size: 15px; font-weight: 700; line-height: 1.3; }
  .sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
  .nav-section { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; opacity: .5; padding: 16px 16px 4px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; cursor: pointer; font-size: 13.5px;
    color: rgba(255,255,255,.8); border-left: 3px solid transparent;
    transition: all .15s;
  }
  .nav-item:hover { background: rgba(255,255,255,.08); color: #fff; }
  .nav-item.active { background: rgba(255,255,255,.12); color: #fff; border-left-color: #fff; font-weight: 600; }
  .nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-footer { padding: 14px 16px; border-top: 1px solid rgba(255,255,255,.1); font-size: 11px; opacity: .5; }

  /* MAIN */
  #main { margin-left: var(--sidebar); flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
  #topbar {
    background: var(--card); border-bottom: 1px solid var(--border);
    padding: 0 28px; height: 56px; display: flex; align-items: center;
    justify-content: space-between; position: sticky; top: 0; z-index: 50;
  }
  .topbar-title { font-size: 16px; font-weight: 700; color: var(--azul); }
  .topbar-sub   { font-size: 12px; color: var(--text2); }
  .topbar-right { display: flex; gap: 10px; align-items: center; }
  #content { padding: 24px 28px; flex: 1; }

  /* CARDS KPI */
  .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi-card {
    background: var(--card); border-radius: 10px; padding: 18px 20px;
    border: 1px solid var(--border); border-left: 4px solid var(--azul);
  }
  .kpi-card.verde  { border-left-color: var(--verde); }
  .kpi-card.laranja{ border-left-color: var(--laranja); }
  .kpi-card.vermelho{ border-left-color: var(--vermelho); }
  .kpi-card.amarelo{ border-left-color: var(--amarelo); }
  .kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; color: var(--text2); margin-bottom: 6px; }
  .kpi-value { font-size: 28px; font-weight: 700; color: var(--azul); line-height: 1; }
  .kpi-card.verde   .kpi-value { color: var(--verde); }
  .kpi-card.laranja .kpi-value { color: var(--laranja); }
  .kpi-card.vermelho.kpi-value { color: var(--vermelho); }

  /* BOTÕES */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .15s; }
  .btn-primary { background: var(--azul); color: #fff; }
  .btn-primary:hover { background: var(--azul2); }
  .btn-success { background: var(--verde); color: #fff; }
  .btn-success:hover { filter: brightness(1.1); }
  .btn-danger  { background: var(--vermelho); color: #fff; }
  .btn-danger:hover  { filter: brightness(1.1); }
  .btn-outline { background: transparent; color: var(--azul); border: 1.5px solid var(--azul); }
  .btn-outline:hover { background: var(--azul); color: #fff; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* TABELA */
  .card { background: var(--card); border-radius: 10px; border: 1px solid var(--border); margin-bottom: 20px; overflow: hidden; }
  .card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-header h3 { font-size: 14px; font-weight: 700; color: var(--azul); }
  .card-body { padding: 0; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f7f9fc; padding: 10px 14px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--text2); border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 10px 14px; border-bottom: 1px solid #f0f2f5; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f7f9fc; }

  /* BADGES */
  .badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-verde   { background: #d4edda; color: #155724; }
  .badge-azul    { background: #d0e8ff; color: #1a4a8a; }
  .badge-laranja { background: #ffe8cc; color: #7a4000; }
  .badge-vermelho{ background: #f8d7da; color: #721c24; }
  .badge-cinza   { background: #e2e3e5; color: #383d41; }
  .badge-amarelo { background: #fff3cd; color: #856404; }

  /* PROGRESS */
  .progress { height: 6px; background: #e9ecef; border-radius: 4px; overflow: hidden; min-width: 80px; }
  .progress-bar { height: 100%; border-radius: 4px; transition: width .3s; }

  /* MODAL */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: #fff; border-radius: 12px; width: 90%; max-width: 620px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
  .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .modal-header h3 { font-size: 16px; font-weight: 700; color: var(--azul); }
  .modal-body { padding: 20px 24px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
  .close-btn { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text2); line-height: 1; }
  .close-btn:hover { color: var(--vermelho); }

  /* FORM */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-grid.col3 { grid-template-columns: 1fr 1fr 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; font-weight: 600; color: var(--text2); }
  input, select, textarea {
    padding: 8px 11px; border: 1.5px solid var(--border); border-radius: 7px;
    font-size: 13px; color: var(--text); background: #fff; width: 100%;
    transition: border-color .15s;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--azul); }
  textarea { resize: vertical; min-height: 60px; }

  /* DISC LIST dentro do contrato */
  .disc-list { padding: 0 20px 16px; }
  .disc-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; background: #f7f9fc; border-radius: 8px;
    border: 1px solid var(--border); margin-bottom: 8px;
  }
  .disc-nome { font-weight: 600; font-size: 13px; flex: 1; }
  .disc-info { font-size: 12px; color: var(--text2); }

  /* TABS internas */
  .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
  .tab-btn { padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: none; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s; }
  .tab-btn.active { color: var(--azul); border-bottom-color: var(--azul); }
  .tab-btn:hover:not(.active) { color: var(--azul); }

  /* SEARCH */
  .search-bar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
  .search-input { padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 7px; font-size: 13px; min-width: 240px; }
  .search-input:focus { outline: none; border-color: var(--azul); }

  /* LOADING */
  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,.4); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-row td { text-align: center; color: var(--text2); padding: 30px; }
  .empty-state { text-align: center; padding: 48px 20px; color: var(--text2); }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* TOAST */
  #toast { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast-item { padding: 12px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; color: #fff; box-shadow: 0 4px 16px rgba(0,0,0,.2); animation: slideIn .2s ease; }
  .toast-item.success { background: var(--verde); }
  .toast-item.error   { background: var(--vermelho); }
  .toast-item.info    { background: var(--azul); }
  @keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* DISCIPLINA MODAL — lista acumulada */
  #disc-added-list { margin-top: 14px; }
  .disc-added-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #f0f6ff; border-radius: 6px; margin-bottom: 6px; font-size: 13px; }
  .disc-added-item .rm { cursor: pointer; color: var(--vermelho); font-weight: 700; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div class="sidebar-logo">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="background:#fff;color:var(--azul);font-weight:900;font-size:14px;padding:4px 7px;border-radius:5px">OTD</div>
      <div>
        <div class="logo-title">Planejamento</div>
        <div class="logo-text">e Controle</div>
      </div>
    </div>
  </div>
  <div class="sidebar-nav">
    <div class="nav-section">Visão Geral</div>
    <div class="nav-item active" onclick="showPage('dashboard')">
      <span class="icon">📊</span> Dashboard
    </div>
    <div class="nav-section">Cadastros</div>
    <div class="nav-item" onclick="showPage('contratos')">
      <span class="icon">📋</span> Contratos
    </div>
    <div class="nav-item" onclick="showPage('colaboradores')">
      <span class="icon">👷</span> Colaboradores
    </div>
    <div class="nav-section">Operação</div>
    <div class="nav-item" onclick="showPage('producao')">
      <span class="icon">⚡</span> Lançar Produção
    </div>
    <div class="nav-item" onclick="showPage('produtividade')">
      <span class="icon">📈</span> Produtividade
    </div>
    <div class="nav-item" onclick="showPage('recursos')">
      <span class="icon">📅</span> Recursos
    </div>
    <div class="nav-item" onclick="showPage('frotas')">
      <span class="icon">🚗</span> Frotas
    </div>
  </div>
  <div class="sidebar-footer">OTD Engenharia © 2026</div>
</nav>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <div>
      <div class="topbar-title" id="page-title">Dashboard</div>
      <div class="topbar-sub" id="page-sub">Visão geral do planejamento</div>
    </div>
    <div class="topbar-right">
      <span id="last-update" style="font-size:11px;color:var(--text2)"></span>
      <button class="btn btn-primary btn-sm" onclick="loadAll()">↻ Atualizar</button>
    </div>
  </div>
  <div id="content"></div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- MODAL CONTRATO -->
<div class="modal-bg" id="modal-contrato">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-contrato-title">Novo Contrato</h3>
      <button class="close-btn" onclick="closeModal('modal-contrato')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="contrato-id">
      <div class="form-grid">
        <div class="form-group full">
          <label>Nome do Contrato *</label>
          <input id="c-nome" placeholder="Ex: EPR - Vias do Café">
        </div>
        <div class="form-group">
          <label>Cliente *</label>
          <select id="c-cliente"></select>
        </div>
        <div class="form-group">
          <label>Ciclo / Ano</label>
          <input id="c-ano" placeholder="Ex: 2026.1">
        </div>
        <div class="form-group">
          <label>Estado</label>
          <input id="c-estado" placeholder="Ex: MG">
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="c-status">
            <option>Aguardando início</option>
            <option>Em campo</option>
            <option>Em atraso</option>
            <option>Concluído</option>
            <option>Pausado</option>
          </select>
        </div>
        <div class="form-group">
          <label>Início Planejado</label>
          <input type="date" id="c-ini-plan">
        </div>
        <div class="form-group">
          <label>Término Planejado (prazo cliente)</label>
          <input type="date" id="c-fim-plan">
        </div>
        <div class="form-group">
          <label>Início Real</label>
          <input type="date" id="c-ini-real">
        </div>
        <div class="form-group">
          <label>Término Estimado (nossa previsão)</label>
          <input type="date" id="c-fim-est">
        </div>
        <div class="form-group full">
          <label>Observações</label>
          <textarea id="c-obs" rows="2"></textarea>
        </div>
      </div>

      <!-- DISCIPLINAS -->
      <div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <strong style="font-size:13px;color:var(--azul)">Disciplinas / Frentes</strong>
          <button class="btn btn-outline btn-sm" onclick="toggleDiscForm()">+ Adicionar</button>
        </div>
        <div id="disc-form" style="display:none;background:#f7f9fc;padding:14px;border-radius:8px;margin-bottom:12px">
          <div class="form-grid col3">
            <div class="form-group">
              <label>Disciplina *</label>
              <select id="d-nome">
                <option value="">Selecione...</option>
                <option>Terrapleno</option>
                <option>Drenagem</option>
                <option>Sinalização Horizontal</option>
                <option>Sinalização Vertical</option>
                <option>Edificações (EDF)</option>
                <option>Faixa de Domínio (AC e OC)</option>
                <option>Faixa de Domínio (Cercas)</option>
                <option>EPS</option>
                <option>Pontos de Iluminação e EDE</option>
                <option>Outro</option>
              </select>
            </div>
            <div class="form-group">
              <label>Unidade</label>
              <select id="d-unidade">
                <option>Und</option><option>m²</option><option>m³</option>
                <option>m</option><option>km</option><option>KM</option>
              </select>
            </div>
            <div class="form-group">
              <label>Nº Frentes</label>
              <input type="number" id="d-frentes" value="1" min="1">
            </div>
            <div class="form-group">
              <label>Qtd. Prevista</label>
              <input type="number" id="d-qtd-prev" placeholder="0">
            </div>
            <div class="form-group">
              <label>Qtd. Real (contratada)</label>
              <input type="number" id="d-qtd-real" placeholder="0">
            </div>
            <div class="form-group">
              <label>Prod./frente/dia</label>
              <input type="number" id="d-prod" placeholder="0">
            </div>
            <div class="form-group">
              <label>Início Planejado</label>
              <input type="date" id="d-ini">
            </div>
            <div class="form-group">
              <label>Término Planejado</label>
              <input type="date" id="d-fim">
            </div>
            <div class="form-group">
              <label>Término Estimado</label>
              <input type="date" id="d-est">
            </div>
          </div>
          <div style="margin-top:10px;display:flex;gap:8px">
            <button class="btn btn-success btn-sm" onclick="addDisc()">✓ Confirmar disciplina</button>
            <button class="btn btn-sm btn-outline" onclick="toggleDiscForm()">Cancelar</button>
          </div>
        </div>
        <div id="disc-added-list"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-contrato')">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar-contrato" onclick="salvarContrato()">Salvar Contrato</button>
    </div>
  </div>
</div>

<!-- MODAL COLABORADOR -->
<div class="modal-bg" id="modal-colab">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-colab-title">Novo Colaborador</h3>
      <button class="close-btn" onclick="closeModal('modal-colab')">×</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="colab-id">
      <div class="form-grid">
        <div class="form-group full">
          <label>Nome *</label>
          <input id="col-nome" placeholder="Nome completo">
        </div>
        <div class="form-group">
          <label>Função</label>
          <select id="col-funcao" onchange="autoTaxa()">
            <option value="Ajudante de Obras">Ajudante de Obras</option>
            <option value="Auxiliar de Engenharia">Auxiliar de Engenharia</option>
            <option value="Assistente de Engenharia">Assistente de Engenharia</option>
            <option value="Terceirizado Campo">Terceirizado Campo</option>
          </select>
        </div>
        <div class="form-group">
          <label>Situação</label>
          <select id="col-situacao">
            <option>Ativo</option>
            <option>Desligado</option>
            <option>INSS</option>
            <option>Desistiu</option>
            <option>Contratação</option>
          </select>
        </div>
        <div class="form-group">
          <label>Estado</label>
          <input id="col-estado" placeholder="Ex: MG">
        </div>
        <div class="form-group">
          <label>Taxa (R$/dia)</label>
          <input type="number" id="col-taxa" placeholder="Automático por função" readonly style="background:#f7f9fc;color:var(--text2)">
        </div>
        <div class="form-group">
          <label>Admissão</label>
          <input type="date" id="col-admissao">
        </div>
        <div class="form-group">
          <label>Desligamento</label>
          <input type="date" id="col-desligamento">
        </div>
        <div class="form-group">
          <label>Promoção (data)</label>
          <input type="date" id="col-promo-data">
        </div>
        <div class="form-group">
          <label>Novo Cargo (após promoção)</label>
          <input id="col-novo-cargo" placeholder="Ex: Auxiliar de Engenharia" list="cargos-list">
          <datalist id="cargos-list">
            <option value="Ajudante de Obras">
            <option value="Auxiliar de Engenharia">
            <option value="Assistente de Engenharia">
            <option value="Terceirizado Campo">
          </datalist>
        </div>
        <div class="form-group full">
          <label>Observações</label>
          <textarea id="col-obs" rows="2"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-colab')">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarColab()">Salvar</button>
    </div>
  </div>
</div>

<!-- MODAL PRODUÇÃO -->
<div class="modal-bg" id="modal-prod">
  <div class="modal" style="max-width:500px">
    <div class="modal-header">
      <h3>Lançar Produção</h3>
      <button class="close-btn" onclick="closeModal('modal-prod')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full">
          <label>Contrato *</label>
          <select id="p-contrato" onchange="loadDiscByContrato()"></select>
        </div>
        <div class="form-group full">
          <label>Disciplina *</label>
          <select id="p-disc"></select>
        </div>
        <div class="form-group">
          <label>Data *</label>
          <input type="date" id="p-data">
        </div>
        <div class="form-group">
          <label>Quantidade *</label>
          <input type="number" id="p-qtd" placeholder="0">
        </div>
        <div class="form-group full">
          <label>Colaborador responsável</label>
          <input id="p-colab" placeholder="Nome do colaborador">
        </div>
        <div class="form-group full">
          <label>Observação</label>
          <textarea id="p-obs" rows="2"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-prod')">Cancelar</button>
      <button class="btn btn-success" onclick="salvarProducao()">Lançar</button>
    </div>
  </div>
</div>

<!-- MODAL FROTA -->
<div class="modal-bg" id="modal-frota">
  <div class="modal" style="max-width:580px">
    <div class="modal-header">
      <h3 id="modal-frota-title">Nova Frota</h3>

const H = {
  'Content-Type': 'application/json',
  'apikey': SUPA_KEY,
  'Authorization': 'Bearer ' + SUPA_KEY,
  'Prefer': 'return=representation'
};

async function db(path, method='GET', body=null) {
  const r = await fetch(SUPA_URL + '/rest/v1/' + path, {
    method, headers: H, body: body ? JSON.stringify(body) : null
  });
  if (!r.ok) { const e = await r.json(); throw new Error(e.message || 'Erro'); }
  return r.status === 204 ? null : r.json();
}

// ── PRODUTIVIDADE ─────────────────────────────────────────────
function getSemanas() {
  const semanas = [];
  const hoje = new Date();
  const diaSem = hoje.getDay() || 7;
  const seg = new Date(hoje); seg.setDate(hoje.getDate() - diaSem + 1);
  for (let i = 0; i < 52; i++) {
    const s = new Date(seg); s.setDate(seg.getDate() - i*7);
    const f = new Date(s); f.setDate(s.getDate() + 4);
    semanas.push({ seg:s, sex:f, label: fmtDateObj(s)+' → '+fmtDateObj(f), key: isoDate(s) });
  }
  return semanas;
}
function fmtDateObj(d) { return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'}); }
function isoDate(d) { return d.toISOString().split('T')[0]; }
function addDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }

async function renderProdutividade() {
  const semanas = getSemanas();
  const semSel = document.getElementById('prod-semana')?.value || semanas[0].key;
  const sem = semanas.find(s=>s.key===semSel) || semanas[0];
  const diasSem = [0,1,2,3,4].map(i=>isoDate(addDays(sem.seg,i)));
  const dtIni = isoDate(sem.seg), dtFim = isoDate(sem.sex);

  let prod = [];
  try {
    prod = await db(`producao?data=gte.${dtIni}&data=lte.${dtFim}&select=*,disciplinas(nome,unidade),contratos(nome,clientes(nome,sigla))`);
  } catch(e) { toast('Erro: '+e.message,'error'); }

  const fConc  = document.getElementById('prod-conc')?.value  || '';
  const fDisc  = document.getElementById('prod-disc')?.value  || '';
  const fColab = (document.getElementById('prod-colab')?.value||'').toLowerCase();

  const concs = [...new Set(prod.map(r=>r.contratos?.nome).filter(Boolean))].sort();
  const discs = [...new Set(prod.map(r=>r.disciplinas?.nome).filter(Boolean))].sort();

  let rows = prod;
  if (fConc)  rows = rows.filter(r=>r.contratos?.nome===fConc);
  if (fDisc)  rows = rows.filter(r=>r.disciplinas?.nome===fDisc);
  if (fColab) rows = rows.filter(r=>(r.colaborador||'').toLowerCase().includes(fColab));

  // Agrupar por (contrato, colaborador, disciplina)
  const grupos = {};
  for (const r of rows) {
    const key = `${r.contratos?.nome}|||${r.colaborador||'(sem colab)'}|||${r.disciplinas?.nome}`;
    if (!grupos[key]) grupos[key] = { cNome:r.contratos?.nome||'—', colab:r.colaborador||'(sem colab)', disc:r.disciplinas?.nome||'—', unidade:r.disciplinas?.unidade||'Und', dias:{}, total:0 };
    grupos[key].dias[r.data] = (grupos[key].dias[r.data]||0) + Number(r.quantidade||0);
    grupos[key].total += Number(r.quantidade||0);
  }

  const linhas = Object.values(grupos);
  const totalProd = linhas.reduce((s,l)=>s+l.total,0);
  const colabsAtivos = [...new Set(rows.map(r=>r.colaborador).filter(Boolean))].length;
  const diasComProd = [...new Set(rows.map(r=>r.data))].length || 1;

  const porContrato = {};
  for (const l of linhas) {
    if (!porContrato[l.cNome]) porContrato[l.cNome] = [];
    porContrato[l.cNome].push(l);
  }

  document.getElementById('content').innerHTML = `
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end">
      <div><label style="display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px">Semana</label>
        <select id="prod-semana" onchange="renderProdutividade()" style="padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;min-width:185px">
          ${semanas.map(s=>`<option value="${s.key}" ${s.key===semSel?'selected':''}>${s.label}</option>`).join('')}
        </select></div>
      <div><label style="display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px">Contrato</label>
        <select id="prod-conc" onchange="renderProdutividade()" style="padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;min-width:180px">
          <option value="">Todos</option>${concs.map(c=>`<option value="${c}" ${c===fConc?'selected':''}>${c}</option>`).join('')}
        </select></div>
      <div><label style="display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px">Disciplina</label>
        <select id="prod-disc" onchange="renderProdutividade()" style="padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;min-width:160px">
          <option value="">Todas</option>${discs.map(d=>`<option value="${d}" ${d===fDisc?'selected':''}>${d}</option>`).join('')}
        </select></div>
      <div><label style="display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:4px">Colaborador</label>
        <input id="prod-colab" placeholder="nome..." value="${fColab}" oninput="renderProdutividade()"
          style="padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;width:130px"></div>
      <button class="btn btn-success btn-sm" style="margin-top:18px" onclick="exportarProdutividade('${semSel}')">⬇ Exportar .xlsx</button>
    </div>

    <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px">
      <div class="kpi-card azul"><div class="kpi-label">Produção Total</div><div class="kpi-value" style="font-size:22px">${totalProd.toLocaleString('pt-BR')}</div><div style="font-size:11px;color:var(--text2)">unidades na semana</div></div>
      <div class="kpi-card verde"><div class="kpi-label">Colabs Ativos</div><div class="kpi-value" style="font-size:22px">${colabsAtivos}</div></div>
      <div class="kpi-card"><div class="kpi-label">Média/Dia</div><div class="kpi-value" style="font-size:22px">${diasComProd>0?(totalProd/diasComProd).toFixed(0):0}</div></div>

async function exportarProdutividade(semKey) {
  const semanas = getSemanas();
  const sem = semanas.find(s=>s.key===semKey)||semanas[0];
  const dtIni = isoDate(sem.seg), dtFim = isoDate(sem.sex);
  const diasSem = [0,1,2,3,4].map(i=>isoDate(addDays(sem.seg,i)));
  const DIAS_HDR = ['Seg','Ter','Qua','Qui','Sex'];

  try {
    const prod = await db(`producao?data=gte.${dtIni}&data=lte.${dtFim}&select=*,disciplinas(nome,unidade),contratos(nome,clientes(nome))`);

    const grupos = {};
    for (const r of prod) {
      const key = `${r.contratos?.nome}|||${r.colaborador||''}|||${r.disciplinas?.nome}`;
      if (!grupos[key]) grupos[key] = { conc:r.contratos?.nome||'', colab:r.colaborador||'', disc:r.disciplinas?.nome||'', unidade:r.disciplinas?.unidade||'Und', dias:{}, total:0 };
      grupos[key].dias[r.data] = (grupos[key].dias[r.data]||0)+Number(r.quantidade||0);
      grupos[key].total += Number(r.quantidade||0);
    }
    const linhas = Object.values(grupos).sort((a,b)=>a.conc.localeCompare(b.conc)||a.colab.localeCompare(b.colab));
    const totalGeral = linhas.reduce((s,l)=>s+l.total,0);

    // Por contrato
    const porConc = {};
    for (const l of linhas) {
      if (!porConc[l.conc]) porConc[l.conc]={colabs:new Set(),total:0};
      porConc[l.conc].colabs.add(l.colab); porConc[l.conc].total+=l.total;
    }
    // Por disciplina
    const porDisc = {};
    for (const l of linhas) {
      if (!porDisc[l.disc]) porDisc[l.disc]={colabs:new Set(),total:0,un:l.unidade};
      porDisc[l.disc].colabs.add(l.colab); porDisc[l.disc].total+=l.total;
    }

    // CSV com separador ; e BOM UTF-8
    let csv = '\uFEFF';
    csv += `PRODUTIVIDADE — Semana ${fmtDateObj(sem.seg)} a ${fmtDateObj(sem.sex)}\n`;
    csv += `${linhas.length} linha(s) | Total geral: ${totalGeral} unidades\n\n`;
    csv += ['Contrato','Colaborador','Disciplina','Unidade',...DIAS_HDR,'Total','Média/dia'].join(';')+'\n';
    for (const l of linhas) {
      const dc=Object.values(l.dias).filter(v=>v>0).length||1;
      csv += [l.conc,l.colab,l.disc,l.unidade,...diasSem.map(d=>l.dias[d]||0),l.total,(l.total/dc).toFixed(1)].join(';')+'\n';
    }
    csv += '\n\nRANKING POR CONTRATO\nContrato;Colabs;Total;Média/dia\n';
    for (const [c,v] of Object.entries(porConc).sort(([,a],[,b])=>b.total-a.total))
      csv += `${c};${v.colabs.size};${v.total};${(v.total/5).toFixed(1)}\n`;
    csv += '\n\nRANKING POR DISCIPLINA\nDisciplina;Unidade;Colabs;Total;Média/dia\n';
    for (const [d,v] of Object.entries(porDisc).sort(([,a],[,b])=>b.total-a.total))
      csv += `${d};${v.un};${v.colabs.size};${v.total};${(v.total/5).toFixed(1)}\n`;

    const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Produtividade_${dtIni}.csv`;
    a.click();
    toast('Exportado!','success');
  } catch(e) { toast('Erro: '+e.message,'error'); }
}

async function salvarContrato() {
  const nome = document.getElementById('c-nome').value.trim();
  if (!nome) { toast('Nome do contrato é obrigatório', 'error'); return; }

  const btn = document.getElementById('btn-salvar-contrato');
  btn.innerHTML = '<span class="spinner"></span> Salvando...'; btn.disabled = true;

  try {
    const payload = {
      nome,
      cliente_id: document.getElementById('c-cliente').value || null,
      ano: document.getElementById('c-ano').value || null,
      estado: document.getElementById('c-estado').value || null,
      status: document.getElementById('c-status').value,
      inicio_planejado:  document.getElementById('c-ini-plan').value || null,
      termino_planejado: document.getElementById('c-fim-plan').value || null,
      inicio_real:       document.getElementById('c-ini-real').value || null,
      termino_estimado:  document.getElementById('c-fim-est').value || null,
      obs: document.getElementById('c-obs').value || null,
      updated_at: new Date().toISOString(),
    };

    const cid = document.getElementById('contrato-id').value;
    let contratoId;
    if (cid) {
      await db(`contratos?id=eq.${cid}`, 'PATCH', payload);
      contratoId = cid;
    } else {
      const res = await db('contratos', 'POST', payload);
      contratoId = res[0].id;
    }

    // Salvar disciplinas novas
    for (const d of discTemp) {
      if (d._saved) continue;
      await db('disciplinas', 'POST', {
        contrato_id: contratoId,
        nome: d.nome, unidade: d.unidade,
        qtd_prevista: d.qtd_prevista||0, qtd_real: d.qtd_real||0,
        qtd_feita: 0, num_frentes: d.num_frentes||1,
        produtividade_frente: d.produtividade_frente||null,
        inicio_planejado: d.inicio_planejado||null,
        termino_planejado: d.termino_planejado||null,
        termino_estimado: d.termino_estimado||null,
      });
    }

    toast(cid ? 'Contrato atualizado!' : 'Contrato salvo!', 'success');
    closeModal('modal-contrato');
    await loadAll();
  } catch(e) { toast('Erro: ' + e.message, 'error'); }
  finally { btn.innerHTML = 'Salvar Contrato'; btn.disabled = false; }
}

        <table>
          <thead><tr>
            <th>Colaborador Atual</th><th>Placa</th><th>Veículo</th><th>Locadora</th>
            <th>Retirada Inicial</th><th>Status</th><th>Ações</th>
          </tr></thead>
          <tbody>
            ${lista.length===0
              ? `<tr><td colspan="7"><div class="empty-state"><div class="icon">🚗</div><p>Nenhum veículo encontrado.</p></div></td></tr>`
              : lista.map(f=>`
                <tr>
                  <td><strong>${f.colaborador_atual||'—'}</strong><br>
                    <small style="color:var(--text2);font-size:11px">${f.locadora||''}</small>
                  </td>
                  <td><code style="background:#f0f2f5;padding:2px 6px;border-radius:4px;font-size:12px">${f.placa_atual||'—'}</code></td>
                  <td>${f.veiculo||'—'}</td>
                  <td style="font-size:12px">${f.locadora||'—'}</td>
                  <td style="font-size:12px">${f.data_retirada_ini?fmtDate(f.data_retirada_ini):'—'}</td>
                  <td>${badgeFrota(f.status)}</td>
                  <td style="display:flex;gap:4px">
                    <button class="btn btn-sm btn-outline" onclick="verHistoricoFrota('${f.id}')" title="Ver histórico">📋</button>
                    <button class="btn btn-sm btn-outline" onclick="editarFrota('${f.id}')">✏️</button>
                    <button class="btn btn-sm btn-danger" onclick="deletarFrota('${f.id}')">🗑</button>
                  </td>
                </tr>
                <tr id="hist-${f.id}" style="display:none">
                  <td colspan="7" style="padding:0;background:#f7f9fc">
                    <div id="hist-body-${f.id}" style="padding:12px 20px"></div>
                  </td>
                </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

async function verHistoricoFrota(fid) {
  const tr = document.getElementById(`hist-${fid}`);
  const body = document.getElementById(`hist-body-${fid}`);
  if (!tr || !body) return;
  if (tr.style.display !== 'none') { tr.style.display='none'; return; }
  tr.style.display='table-row';
  body.innerHTML = '<em style="color:var(--text2);font-size:13px">Carregando histórico...</em>';
  try {
    const hist = await db(`frotas_historico?frota_id=eq.${fid}&order=data_retirada.asc`);
    if (!hist.length) { body.innerHTML='<em style="color:var(--text2)">Sem movimentações registradas.</em>'; return; }
    body.innerHTML = `
      <strong style="font-size:12px;color:var(--azul);display:block;margin-bottom:8px">Histórico de movimentações</strong>
      <table style="width:100%;font-size:12px;border-collapse:collapse">
        <thead><tr style="background:#e8edf5">
          <th style="padding:6px 10px;text-align:left">Colaborador</th>
          <th style="padding:6px 10px;text-align:left">Placa</th>
          <th style="padding:6px 10px;text-align:left">Retirada</th>
          <th style="padding:6px 10px;text-align:left">Devolução</th>
          <th style="padding:6px 10px;text-align:left">KM</th>
          <th style="padding:6px 10px;text-align:left">Gasto</th>
          <th style="padding:6px 10px;text-align:left">Status</th>
          <th style="padding:6px 10px;text-align:left">Obs</th>
        </tr></thead>
        <tbody>
          ${hist.map(h=>`<tr style="border-bottom:1px solid #e0e5ef">
            <td style="padding:6px 10px"><strong>${h.colaborador||'—'}</strong></td>
            <td style="padding:6px 10px;font-family:monospace">${h.placa||'—'}</td>
            <td style="padding:6px 10px">${h.data_retirada?fmtDate(h.data_retirada):'—'}</td>
            <td style="padding:6px 10px">${h.data_devolucao?fmtDate(h.data_devolucao):'—'}</td>
            <td style="padding:6px 10px">${h.km_inicial&&h.km_final?(h.km_final-h.km_inicial).toLocaleString('pt-BR')+' km':'—'}</td>
            <td style="padding:6px 10px">${h.gasto?'R$ '+Number(h.gasto).toLocaleString('pt-BR',{minimumFractionDigits:0}):'—'}</td>
            <td style="padding:6px 10px"><span class="badge ${h.status==='Ativo'?'badge-verde':h.status==='Transferido'?'badge-amarelo':'badge-cinza'}">${h.status||'—'}</span></td>
            <td style="padding:6px 10px;color:var(--text2);font-size:11px">${h.observacao||'—'}</td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  } catch(e) { body.innerHTML=`<em style="color:var(--vermelho)">Erro: ${e.message}</em>`; }
}

function abrirModalFrota(id=null) {
  document.getElementById('modal-frota-title').textContent = id ? 'Editar Frota' : 'Nova Frota';
  ['frota-id','fr-reserva','fr-colaborador','fr-placa','fr-local','fr-obs'].forEach(f=>{const el=document.getElementById(f);if(el)el.value='';});
  ['fr-data-ret','fr-mensalidade'].forEach(f=>{const el=document.getElementById(f);if(el)el.value='';});
  document.getElementById('fr-locadora').value='Localiza';
  document.getElementById('fr-veiculo').value='Kwid';
  document.getElementById('fr-status').value='Ativo';
  const dl = document.getElementById('colab-list-fr');
  if (dl) dl.innerHTML = colaboradores.map(c=>`<option value="${c.nome}">`).join('');
  if (id) {
    const f = frotas.find(x=>x.id===id);
    if (f) {
      document.getElementById('frota-id').value=f.id;
      document.getElementById('fr-locadora').value=f.locadora||'Localiza';
      document.getElementById('fr-reserva').value=f.reserva||'';
      document.getElementById('fr-colaborador').value=f.colaborador_atual||'';
      document.getElementById('fr-placa').value=f.placa_atual||'';
      document.getElementById('fr-veiculo').value=f.veiculo||'Kwid';
      document.getElementById('fr-status').value=f.status||'Ativo';
      document.getElementById('fr-mensalidade').value=f.mensalidade||'';
      document.getElementById('fr-data-ret').value=f.data_retirada_ini||'';
      document.getElementById('fr-local').value=f.local_retirada||'';
      document.getElementById('fr-obs').value=f.observacao||'';
    }
  }
  openModal('modal-frota');
}
function editarFrota(id){ abrirModalFrota(id); }

async function salvarFrota() {
  const colab = document.getElementById('fr-colaborador').value.trim();
  if (!colab) { toast('Colaborador é obrigatório','error'); return; }
  try {
    const payload = {
      locadora:        document.getElementById('fr-locadora').value,
      reserva:         document.getElementById('fr-reserva').value||null,
      colaborador_atual: colab,
      placa_atual:     document.getElementById('fr-placa').value.toUpperCase()||null,
      local_retirada:  document.getElementById('fr-local').value||null,
      veiculo:         document.getElementById('fr-veiculo').value,
      mensalidade:     parseFloat(document.getElementById('fr-mensalidade').value)||null,
      data_retirada_ini: document.getElementById('fr-data-ret').value||null,
      status:          document.getElementById('fr-status').value,
      observacao:      document.getElementById('fr-obs').value||null,
      updated_at:      new Date().toISOString(),
    };
    const fid = document.getElementById('frota-id').value;
    if (fid) {
      await db(`frotas?id=eq.${fid}`,'PATCH',payload);
      toast('Frota atualizada!','success');
    } else {
      await db('frotas','POST',payload);
      toast('Frota cadastrada!','success');
    }
    closeModal('modal-frota');
    await renderFrotas();
  } catch(e) { toast('Erro: '+e.message,'error'); }
}

async function deletarFrota(id) {
  if (!confirm('Excluir esta reserva e todo o seu histórico?')) return;
  try {
    await db(`frotas_historico?frota_id=eq.${id}`,'DELETE');
    await db(`frotas?id=eq.${id}`,'DELETE');
    toast('Excluído','success');
    await renderFrotas();
  } catch(e) { toast('Erro: '+e.message,'error'); }
}

// ── TAXA AUTOMÁTICA POR FUNÇÃO ────────────────────────────────
const TAXAS = {
  'Ajudante de Obras':       0.70,
  'Auxiliar de Engenharia':  0.75,
  'Assistente de Engenharia':0.90,
  'Terceirizado Campo':      1.30,
};
function autoTaxa() {
  const f = document.getElementById('col-funcao')?.value;
  const t = document.getElementById('col-taxa');
  if (t && TAXAS[f]) t.value = TAXAS[f];
}
function calcPct(discs) {
  const com = discs.filter(d=>d.qtd_real>0);
  if (!com.length) return 0;
  return Math.round(com.reduce((s,d)=>s+Math.min(100,(d.qtd_feita||0)/d.qtd_real*100),0)/com.length);
}

function fmtDate(d) {
  if (!d) return '—';
  const [y,m,di] = d.split('T')[0].split('-');
  return `${di}/${m}/${y}`;
}

function badgeStatus(s) {
  const map = {
    'Concluído':'badge-verde','Em campo':'badge-azul',
    'Em atraso':'badge-vermelho','Aguardando início':'badge-cinza','Pausado':'badge-amarelo'
  };
  return `<span class="badge ${map[s]||'badge-cinza'}">${s||'—'}</span>`;
}

function badgeSituacao(s) {
  const map = {'Ativo':'badge-verde','Desligado':'badge-vermelho','INSS':'badge-amarelo','Desistiu':'badge-laranja','Contratação':'badge-azul'};
  return `<span class="badge ${map[s]||'badge-cinza'}">${s||'—'}</span>`;
}

function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast-item ${type}`;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3200);
}

// Fechar modal clicando fora
document.querySelectorAll('.modal-bg').forEach(bg => {
  bg.addEventListener('click', e => { if(e.target===bg) bg.classList.remove('open'); });
});

// ── INIT ──────────────────────────────────────────────────────
loadAll();
